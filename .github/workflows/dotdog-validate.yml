name: dotdog-validate

on:
  pull_request:
    paths:
      - 'specs/**/*.dog'
      - 'dags/**/*.dog'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - run: bun install -g dotdog@latest
      - run: dotdog validate
