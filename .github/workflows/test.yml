name: test

on:
  pull_request:
    paths:
      - 'skills/intelligence-engine/**'
      - 'tests/**'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: python -m pytest tests/ -v
